<body class="bg-brand-dark text-slate-100 min-h-screen flex flex-col font-sans selection:bg-brand-accent/30 selection:text-brand-accent">

    <script>
        window.capturedErrors = [];
        const originalConsoleError = console.error;
        console.error = function(...args) {
            const errorMsg = args.map(arg => {
                if (typeof arg === 'object') {
                    try { return JSON.stringify(arg); } catch(e) { return arg.toString(); }
                }
                return arg.toString();
            }).join(' ');
            window.capturedErrors.push(errorMsg);
            
            // Live update troubleshooter panel if open
            const logDisplay = document.getElementById('consoleLogDisplay');
            if (logDisplay) {
                logDisplay.innerHTML += `<div class="text-rose-400 font-mono text-[10px] p-1.5 bg-rose-950/30 border border-rose-900/30 rounded mb-1.5 break-words">> ${errorMsg}</div>`;
            }
            originalConsoleError.apply(console, args);
        };
    </script>
